apiVersion: external-secrets.io/v1
kind: PushSecret
metadata:
  name: push-gateway-secret
  namespace: gateway
spec:
  secretStoreRef:
    name: gcp-store
    kind: SecretStore
  selector:
    secret:
      name: api-key
  data:
    - match:
        secretKey: api-key 
        remoteRef:
          remoteKey: api-key 